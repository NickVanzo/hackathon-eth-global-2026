<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Agent Arena Architecture</text>
  <text x="600" y="62" text-anchor="middle" font-size="13" fill="#64748b">Competitive AI Liquidity Management on Uniswap</text>

  <!-- ==================== 0G TESTNET ZONE ==================== -->
  <rect x="30" y="85" width="430" height="460" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="245" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">0G Testnet (accounting only)</text>

  <!-- Vault -->
  <rect x="60" y="130" width="370" height="220" rx="12" fill="white" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="245" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">Vault</text>
  <text x="245" y="173" text-anchor="middle" font-size="11" fill="#64748b">Share Token + Accounting Layer</text>

  <text x="80" y="198" font-size="11" fill="#334155">Token Bucket Allocator</text>
  <text x="80" y="216" font-size="11" fill="#334155">Sharpe Scoring / EMAs</text>
  <text x="80" y="234" font-size="11" fill="#334155">Intent Queue</text>
  <text x="80" y="252" font-size="11" fill="#334155">Agent Registry</text>

  <text x="260" y="198" font-size="11" fill="#334155">Commission Ledger</text>
  <text x="260" y="216" font-size="11" fill="#334155">Protocol Fee Tracking</text>
  <text x="260" y="234" font-size="11" fill="#334155">Epoch Settlement (lazy)</text>
  <text x="260" y="252" font-size="11" fill="#334155">Withdrawal Processing</text>

  <!-- Epoch settlement detail -->
  <rect x="70" y="268" width="350" height="70" rx="8" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="245" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">_settleEpoch() - 9 steps</text>
  <text x="80" y="300" font-size="9" fill="#475569">1. Update EMAs  2. Sharpe scores  3. Eviction check</text>
  <text x="80" y="313" font-size="9" fill="#475569">4. Promotion check  5. Rebalance buckets  6. Fee waterfall</text>
  <text x="80" y="326" font-size="9" fill="#475569">7. Handle withdrawals  8. Emit EpochSettled  9. Advance epoch</text>

  <!-- iNFT Contract -->
  <rect x="60" y="365" width="170" height="60" rx="10" fill="white" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="390" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">iNFT Contract</text>
  <text x="145" y="407" text-anchor="middle" font-size="10" fill="#64748b">ERC-721 ownership deeds</text>

  <!-- Constructor params badge -->
  <rect x="250" y="365" width="180" height="60" rx="10" fill="white" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Constructor Params</text>
  <text x="340" y="402" text-anchor="middle" font-size="9" fill="#64748b">alpha, maxAgents, epochLength</text>
  <text x="340" y="414" text-anchor="middle" font-size="9" fill="#64748b">protocolFeeRate, commissionRate...</text>

  <!-- ==================== SEPOLIA ZONE ==================== -->
  <rect x="740" y="85" width="430" height="460" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="955" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Ethereum Sepolia (all tokens)</text>

  <!-- Satellite -->
  <rect x="770" y="130" width="370" height="220" rx="12" fill="white" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="955" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">Satellite</text>
  <text x="955" y="173" text-anchor="middle" font-size="11" fill="#64748b">Fund Custodian + Uniswap Executor</text>

  <text x="790" y="198" font-size="11" fill="#334155">Holds ALL tokens (USDC.e)</text>
  <text x="790" y="216" font-size="11" fill="#334155">Owns all LP positions</text>
  <text x="790" y="234" font-size="11" fill="#334155">Zap-in/out (SwapRouter)</text>
  <text x="790" y="252" font-size="11" fill="#334155">Deposits / Withdrawals</text>

  <text x="980" y="198" font-size="11" fill="#334155">Idle reserve (20%)</text>
  <text x="980" y="216" font-size="11" fill="#334155">Commission reserve</text>
  <text x="980" y="234" font-size="11" fill="#334155">Protocol reserve</text>
  <text x="980" y="252" font-size="11" fill="#334155">Reports position values</text>

  <!-- Uniswap integration -->
  <rect x="780" y="268" width="350" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="955" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Uniswap v3 Integration</text>
  <text x="790" y="300" font-size="9" fill="#475569">NonfungiblePositionManager - open/close/modify LP</text>
  <text x="790" y="313" font-size="9" fill="#475569">SwapRouter - zap-in (USDC->ETH) / zap-out (ETH->USDC)</text>
  <text x="790" y="326" font-size="9" fill="#475569">collect() - realize accrued fees at epoch reporting</text>

  <!-- Uniswap Pool -->
  <rect x="770" y="365" width="170" height="60" rx="10" fill="#ff007a" fill-opacity="0.08" stroke="#ff007a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="855" y="390" text-anchor="middle" font-size="13" font-weight="600" fill="#ff007a">Uniswap Pool</text>
  <text x="855" y="407" text-anchor="middle" font-size="10" fill="#64748b">e.g., ETH/USDC on Sepolia</text>

  <!-- User interaction badge -->
  <rect x="960" y="365" width="180" height="60" rx="10" fill="white" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 2" filter="url(#shadow)"/>
  <text x="1050" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Users interact HERE</text>
  <text x="1050" y="402" text-anchor="middle" font-size="9" fill="#64748b">deposit, withdraw, register,</text>
  <text x="1050" y="414" text-anchor="middle" font-size="9" fill="#64748b">claim commissions, pause</text>

  <!-- ==================== RELAYER ==================== -->
  <rect x="490" y="140" width="220" height="130" rx="14" fill="white" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="168" text-anchor="middle" font-size="15" font-weight="700" fill="#ea580c">Relayer</text>
  <text x="600" y="186" text-anchor="middle" font-size="10" fill="#64748b">Node.js script (~100 lines)</text>
  <text x="510" y="210" font-size="10" fill="#475569">Hackathon: centralized</text>
  <text x="510" y="226" font-size="10" fill="#475569">Production: permissionless</text>
  <text x="510" y="242" font-size="10" fill="#475569">network (bonds + fraud proofs)</text>
  <text x="510" y="258" font-size="10" fill="#475569">Relay fees from protocol rev.</text>

  <!-- Relayer arrows -->
  <!-- Vault to Relayer -->
  <line x1="430" y1="180" x2="488" y2="180" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="455" y="174" text-anchor="middle" font-size="8" fill="#f97316">IntentQueued</text>

  <!-- Relayer to Vault -->
  <line x1="488" y1="220" x2="430" y2="220" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="455" y="214" text-anchor="middle" font-size="8" fill="#f97316">reportValues</text>

  <!-- Relayer to Satellite -->
  <line x1="712" y1="180" x2="768" y2="180" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="742" y="174" text-anchor="middle" font-size="8" fill="#f97316">executeBatch</text>

  <!-- Satellite to Relayer -->
  <line x1="768" y1="220" x2="712" y2="220" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="742" y="214" text-anchor="middle" font-size="8" fill="#f97316">ValuesReported</text>

  <!-- ==================== AGENTS ==================== -->
  <rect x="120" y="560" width="340" height="160" rx="14" fill="white" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="585" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">OpenClaw Agents (fly.io)</text>
  <text x="290" y="602" text-anchor="middle" font-size="10" fill="#64748b">Sandboxed AI strategies | TEE-ready for production</text>

  <!-- Agent boxes -->
  <rect x="140" y="618" width="88" height="85" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="184" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Agent A</text>
  <text x="184" y="653" text-anchor="middle" font-size="9" fill="#64748b">iNFT #1</text>
  <text x="184" y="668" text-anchor="middle" font-size="9" fill="#64748b">[bucket]</text>
  <text x="184" y="683" text-anchor="middle" font-size="8" fill="#a78bfa">Aggressive</text>
  <text x="184" y="695" text-anchor="middle" font-size="8" fill="#a78bfa">tight ranges</text>

  <rect x="246" y="618" width="88" height="85" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="290" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Agent B</text>
  <text x="290" y="653" text-anchor="middle" font-size="9" fill="#64748b">iNFT #2</text>
  <text x="290" y="668" text-anchor="middle" font-size="9" fill="#64748b">[bucket]</text>
  <text x="290" y="683" text-anchor="middle" font-size="8" fill="#a78bfa">Conservative</text>
  <text x="290" y="695" text-anchor="middle" font-size="8" fill="#a78bfa">wide ranges</text>

  <rect x="352" y="618" width="88" height="85" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="396" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Agent C</text>
  <text x="396" y="653" text-anchor="middle" font-size="9" fill="#64748b">iNFT #3</text>
  <text x="396" y="668" text-anchor="middle" font-size="9" fill="#64748b">[bucket]</text>
  <text x="396" y="683" text-anchor="middle" font-size="8" fill="#ef4444">Bad strategy</text>
  <text x="396" y="695" text-anchor="middle" font-size="8" fill="#ef4444">gets evicted</text>

  <!-- Agent to Vault arrow -->
  <line x1="290" y1="558" x2="245" y2="442" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="248" y="500" font-size="9" fill="#7c3aed" transform="rotate(-55, 248, 500)">submitIntent()</text>

  <!-- ==================== SUBGRAPH MCP ==================== -->
  <rect x="520" y="600" width="200" height="100" rx="12" fill="white" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="628" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">Subgraph MCP</text>
  <text x="620" y="645" text-anchor="middle" font-size="10" fill="#64748b">TheGraph + MCP interface</text>
  <text x="620" y="665" text-anchor="middle" font-size="9" fill="#475569">Pool prices, volume, ticks</text>
  <text x="620" y="679" text-anchor="middle" font-size="9" fill="#475569">Liquidity distribution, fees</text>
  <text x="620" y="693" text-anchor="middle" font-size="9" fill="#475569">Agent's "eyes" into the market</text>

  <!-- Agent to Subgraph arrow -->
  <line x1="462" y1="660" x2="518" y2="650" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="490" y="645" text-anchor="middle" font-size="8" fill="#0ea5e9">query</text>

  <!-- Subgraph reads Sepolia -->
  <line x1="720" y1="640" x2="955" y2="440" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-blue)"/>
  <text x="860" y="530" font-size="8" fill="#0ea5e9" transform="rotate(-40, 860, 530)">reads Sepolia chain data</text>

  <!-- ==================== DASHBOARD ==================== -->
  <rect x="800" y="570" width="190" height="100" rx="12" fill="white" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="895" y="598" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Dashboard</text>
  <text x="895" y="615" text-anchor="middle" font-size="10" fill="#64748b">Web frontend</text>
  <text x="895" y="635" text-anchor="middle" font-size="9" fill="#475569">Sharpe scores, allocations</text>
  <text x="895" y="649" text-anchor="middle" font-size="9" fill="#475569">Agent positions, commissions</text>
  <text x="895" y="663" text-anchor="middle" font-size="9" fill="#475569">iNFT marketplace view</text>

  <!-- ==================== FEE WATERFALL ==================== -->
  <rect x="30" y="760" width="540" height="120" rx="14" fill="white" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="785" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Fee Waterfall (per epoch, from collected Uniswap fees)</text>

  <rect x="50" y="800" width="150" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="125" y="822" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Protocol Fee (5%)</text>

  <text x="215" y="822" text-anchor="middle" font-size="16" fill="#64748b">-></text>

  <rect x="230" y="800" width="150" height="35" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="305" y="822" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Agent Comm (10%)</text>

  <text x="395" y="822" text-anchor="middle" font-size="16" fill="#64748b">-></text>

  <rect x="410" y="800" width="150" height="35" rx="6" fill="#ecfdf5" stroke="#22c55e" stroke-width="1"/>
  <text x="485" y="822" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Depositor Yield</text>

  <text x="125" y="855" text-anchor="middle" font-size="9" fill="#64748b">Protocol treasury</text>
  <text x="305" y="855" text-anchor="middle" font-size="9" fill="#64748b">iNFT owner</text>
  <text x="485" y="855" text-anchor="middle" font-size="9" fill="#64748b">Share value increase</text>

  <!-- ==================== AGENT LIFECYCLE ==================== -->
  <rect x="610" y="760" width="560" height="120" rx="14" fill="white" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="785" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">Agent Lifecycle</text>

  <rect x="630" y="800" width="90" height="35" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="675" y="822" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Register</text>

  <text x="730" y="822" text-anchor="middle" font-size="14" fill="#64748b">-></text>

  <rect x="740" y="800" width="90" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="785" y="822" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Prove</text>

  <text x="840" y="822" text-anchor="middle" font-size="14" fill="#64748b">-></text>

  <rect x="850" y="800" width="90" height="35" rx="6" fill="#ecfdf5" stroke="#22c55e" stroke-width="1"/>
  <text x="895" y="822" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Promote</text>

  <text x="950" y="822" text-anchor="middle" font-size="14" fill="#64748b">-></text>

  <rect x="960" y="800" width="90" height="35" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="1005" y="822" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Earn</text>

  <text x="1060" y="822" text-anchor="middle" font-size="14" fill="#64748b">-></text>

  <rect x="1070" y="800" width="90" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="1115" y="822" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Evict</text>

  <text x="675" y="855" text-anchor="middle" font-size="8" fill="#64748b">own capital</text>
  <text x="785" y="855" text-anchor="middle" font-size="8" fill="#64748b">Sharpe track</text>
  <text x="895" y="855" text-anchor="middle" font-size="8" fill="#64748b">token bucket</text>
  <text x="1005" y="855" text-anchor="middle" font-size="8" fill="#64748b">commissions</text>
  <text x="1115" y="855" text-anchor="middle" font-size="8" fill="#64748b">if bad Sharpe</text>

  <!-- ==================== USERS ==================== -->
  <!-- User icon area -->
  <rect x="1010" y="475" width="140" height="70" rx="10" fill="white" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1080" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Users</text>
  <text x="1080" y="516" text-anchor="middle" font-size="9" fill="#64748b">Deposit / Withdraw</text>
  <text x="1080" y="530" text-anchor="middle" font-size="9" fill="#64748b">Sepolia only</text>

  <!-- User to Satellite arrow -->
  <line x1="1080" y1="473" x2="1050" y2="427" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ==================== LEGEND ==================== -->
  <rect x="490" y="290" width="220" height="130" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Legend</text>

  <line x1="510" y1="330" x2="540" y2="330" stroke="#f97316" stroke-width="2"/>
  <text x="550" y="334" font-size="10" fill="#475569">Relayer messages</text>

  <line x1="510" y1="350" x2="540" y2="350" stroke="#8b5cf6" stroke-width="2"/>
  <text x="550" y="354" font-size="10" fill="#475569">Agent intents</text>

  <line x1="510" y1="370" x2="540" y2="370" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="374" font-size="10" fill="#475569">User interactions</text>

  <line x1="510" y1="390" x2="540" y2="390" stroke="#0ea5e9" stroke-width="2"/>
  <text x="550" y="394" font-size="10" fill="#475569">Data reads (Subgraph)</text>

  <line x1="510" y1="410" x2="540" y2="410" stroke="#64748b" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="550" y="414" font-size="10" fill="#475569">Indirect / async</text>
</svg>