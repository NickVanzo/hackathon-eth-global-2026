apiVersion: apps/v1
kind: Deployment
metadata:
  name: relayer
  namespace: arena-relayer
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: relayer

  template:
    metadata:
      labels:
        app: relayer
    spec:
      serviceAccountName: relayer-worker
      terminationGracePeriodSeconds: 60

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: relayer
          image: us-central1-docker.pkg.dev/subgraph-mcp/arena-images/relayer:latest
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"

          ports:
            - name: http
              containerPort: 9898
              protocol: TCP

          envFrom:
            - configMapRef:
                name: relayer-config
            - secretRef:
                name: relayer-secret
