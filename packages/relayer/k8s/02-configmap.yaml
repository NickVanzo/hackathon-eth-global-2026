apiVersion: v1
kind: ConfigMap
metadata:
  name: relayer-config
  namespace: arena-relayer
data:
  # Envio indexer
  ENVIO_INDEXER_HOST: "0.0.0.0"
  ENVIO_INDEXER_PORT: "9898"
  CONFIG_FILE: "config.yaml"
  LOG_LEVEL: "trace"
  LOG_STRATEGY: "console-pretty"
  TUI_OFF: "true"

  # Postgres (in-cluster)
  ENVIO_PG_HOST: "postgres-service.arena-relayer.svc.cluster.local"
  ENVIO_PG_PORT: "5432"
  ENVIO_PG_USER: "arena"
  ENVIO_PG_DATABASE: "arena_indexer"
  ENVIO_PG_PUBLIC_SCHEMA: "envio"
  ENVIO_PG_SSL_MODE: "disable"
  PGSSLMODE: "disable"

  # Hasura (lives in arena-subgraph namespace)
  HASURA_GRAPHQL_ENDPOINT: "http://hasura-service.arena-subgraph.svc.cluster.local:8080/v1/metadata"
  HASURA_GRAPHQL_ROLE: "admin"
  HASURA_SERVICE_HOST: "hasura-service.arena-subgraph.svc.cluster.local"
  HASURA_SERVICE_PORT: "8080"

  # RPC
  SEPOLIA_RPC_URL: "https://ethereum-sepolia.publicnode.com"
  ZG_RPC_URL: "https://evmrpc-testnet.0g.ai"

  # Contract addresses
  SATELLITE_ADDRESS: "0xf555e8e01cbf59a35b67a0c77830118f06f8d8d8"
  VAULT_ADDRESS: "0xfd3adf85acc5a048e683f0da32ea8386c5dcb3ef"
  AGENT_MANAGER_ADDRESS: "0x92740b1873fafdb4464328201b095334431d9e42"

  # Token addresses (Sepolia)
  USDC_E_ADDRESS: "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238"
  WETH_ADDRESS: "0xfFf9976782d46CC05630D1f6eBAb18b2324d6B14"

  # Envio throttle settings
  ENVIO_THROTTLE_CHAIN_METADATA_INTERVAL_MILLIS: "5000"
  ENVIO_THROTTLE_PRUNE_STALE_DATA_INTERVAL_MILLIS: "5000"
  ENVIO_THROTTLE_LIVE_METRICS_BENCHMARK_INTERVAL_MILLIS: "5000"
  ENVIO_THROTTLE_JSON_FILE_BENCHMARK_INTERVAL_MILLIS: "5000"
