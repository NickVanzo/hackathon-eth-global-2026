# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: envio-indexer
networks:
- id: 16602
  start_block: 25711409
  rpc: https://evmrpc-testnet.0g.ai
  contracts:
  - name: Vault
    address:
    - 0x904588f5074f9c75325906ad3613a3f7a98a4d02
    handler: src/EventHandlers.ts
    events:
    - event: Approval(address indexed owner, address indexed spender, uint256 value)
    - event: CommissionAccrued(uint256 indexed agentId, uint256 amount)
    - event: CommissionApproved(uint256 indexed agentId, address indexed caller, uint256 amount)
    - event: EpochSettled(uint256 sharePrice, uint256 totalShares, uint256 totalAssets)
    - event: ForceCloseRequested(uint256 indexed agentId, uint8 source)
    - event: ProtocolFeeAccrued(uint256 amount)
    - event: RecoveryRecorded(uint256 indexed agentId, uint256 recoveredAmount)
    - event: Transfer(address indexed from, address indexed to, uint256 value)
    - event: WithdrawApproved(address indexed user, uint256 tokenAmount)
    - event: WithdrawReleased(address indexed user, uint256 tokenAmount)
  - name: AgentManager
    address:
    - 0xc346168268af5f69d318c50661592370fdb0ba32
    handler: src/EventHandlers.ts
    events:
    - event: IntentQueued(uint256 indexed agentId, uint8 actionType, bytes params, uint256 blockNumber)
    - event: AgentPromoted(uint256 indexed agentId)
    - event: AgentEvicted(uint256 indexed agentId, bool fullEviction)
    - event: ForceCloseRequested(uint256 indexed agentId, uint8 source)
- id: 11155111
  start_block: 10589862
  rpc: https://ethereum-sepolia.publicnode.com
  contracts:
  - name: Satellite
    address:
    - 0x03a1125a9746fa5fc70411a3235eb8b9d18bc24e
    handler: src/EventHandlers.ts
    events:
    - event: AgentRegistered(uint256 indexed agentId, address agentAddress, address indexed deployer, uint256 provingAmount)
    - event: ClaimWithdrawRequested(address indexed user, uint256 tokenAmount)
    - event: CommissionClaimRequested(uint256 indexed agentId, address indexed caller)
    - event: Deposited(address indexed user, uint256 amount)
    - event: PauseRequested(uint256 indexed agentId, address indexed caller, bool paused)
    - event: PositionOpened(uint256 indexed agentId, uint256 indexed tokenId, int24 tickLower, int24 tickUpper, uint128 liquidity, uint256 amountUSDC)
    - event: PositionClosed(uint256 indexed agentId, uint256 indexed positionId, uint256 recoveredAmount)
    - event: ValuesReported(uint256 indexed agentId, uint256 positionValue, uint256 feesCollected)
    - event: WithdrawFromArenaRequested(uint256 indexed agentId, address indexed caller)
    - event: WithdrawRequested(address indexed user, uint256 tokenAmount)
    - event: WithdrawalCompleted(address indexed user, uint256 tokenAmount)
unordered_multichain_mode: true
preload_handlers: true
