steps:
  - id: ensure-artifact-registry
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe ${_REPOSITORY} \
          --location=${_REGION} >/dev/null 2>&1 || \
        gcloud artifacts repositories create ${_REPOSITORY} \
          --repository-format=docker \
          --location=${_REGION} \
          --description="Docker images for Arena platform"

  - id: build-relayer
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - packages/relayer/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/relayer:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/relayer:latest
      - packages/relayer

  - id: push-relayer
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/relayer

  - id: deploy-relayer
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        gcloud container clusters get-credentials ${_CLUSTER} \
          --region=${_REGION} --project=$PROJECT_ID
        # Update the relayer image in kustomization
        cd packages/relayer/k8s
        sed -i "s|image: relayer:.*|image: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/relayer:$BUILD_ID|" 04-deployment.yaml
        kubectl apply -k .

  - id: deploy-subgraph
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        gcloud container clusters get-credentials ${_CLUSTER} \
          --region=${_REGION} --project=$PROJECT_ID
        kubectl apply -k packages/subgraph/k8s/

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/relayer:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/relayer:latest

substitutions:
  _REGION: us-central1
  _REPOSITORY: arena-images
  _CLUSTER: arena-autopilot

options:
  logging: CLOUD_LOGGING_ONLY
