services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_DOMAIN: "${CADDY_DOMAIN:-localhost}"
    depends_on:
      graphql-engine:
        condition: service_healthy
    networks:
      - envio-indexer-algebra-network
  envio-postgres:
    image: postgres:17.5
    restart: always
    ports:
      - "${ENVIO_PG_PORT:-5435}:5432"
    volumes:
      - envio-indexer-algebra-storage:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${ENVIO_PG_PASSWORD:-testing}
      POSTGRES_USER: ${ENVIO_PG_USER:-postgres}
      POSTGRES_DB: ${ENVIO_PG_DATABASE:-envio-dev}
    networks:
      - envio-indexer-algebra-network
  graphql-engine:
    image: hasura/graphql-engine:v2.43.0
    ports:
      - "${HASURA_EXTERNAL_PORT:-8081}:8080"
    user: 1001:1001
    depends_on:
      - "envio-postgres"
    restart: always
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${ENVIO_PG_USER:-postgres}:${ENVIO_PG_PASSWORD:-testing}@envio-postgres:5432/${ENVIO_PG_DATABASE:-envio-dev}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-true} # can make this default to false once we are further in our development.
      HASURA_GRAPHQL_ENABLED_LOG_TYPES:
        startup, http-log, webhook-log, websocket-log,
        query-log
      HASURA_GRAPHQL_NO_OF_RETRIES: 10
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-testing}
      HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
      PORT: 8080
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
    healthcheck:
      test: timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1
      interval: 5s
      timeout: 2s
      retries: 50
      start_period: 5s
    networks:
      - envio-indexer-algebra-network
  envio-indexer-algebra:
    container_name: envio-indexer-algebra
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ENVIO_INDEXER_PORT:-9898}:${ENVIO_INDEXER_PORT:-9898}"
    depends_on:
      graphql-engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 800M
    restart: always
    environment:
      ENVIO_PG_PASSWORD: ${ENVIO_PG_PASSWORD:-testing}
      ENVIO_PG_HOST: envio-postgres
      ENVIO_PG_PORT: 5432
      ENVIO_PG_USER: ${ENVIO_PG_USER:-postgres}
      ENVIO_PG_DATABASE: ${ENVIO_PG_DATABASE:-envio-dev}
      ENVIO_PG_PUBLIC_SCHEMA: ${ENVIO_PG_PUBLIC_SCHEMA:-envio}
      ENVIO_PG_SSL_MODE: ${ENVIO_PG_SSL_MODE:-false}
      ENVIO_INDEXER_HOST: 0.0.0.0
      ENVIO_INDEXER_PORT: ${ENVIO_INDEXER_PORT:-9898}
      CONFIG_FILE: ${CONFIG_FILE:-config.yaml}
      LOG_LEVEL: ${LOG_LEVEL:-trace}
      LOG_STRATEGY: ${LOG_STRATEGY:-console-pretty}
      HASURA_GRAPHQL_ROLE: ${HASURA_GRAPHQL_ROLE:-admin}
      HASURA_GRAPHQL_ENDPOINT: http://graphql-engine:8080/v1/metadata
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-testing}
      HASURA_SERVICE_HOST: graphql-engine
      HASURA_SERVICE_PORT: 8080
      TUI_OFF: ${TUI_OFF:-true}
      PRIVATE_KEY_RELAYER: ${PRIVATE_KEY_RELAYER:-}
      SATELLITE_ADDRESS: ${SATELLITE_ADDRESS:-}
      VAULT_ADDRESS: ${VAULT_ADDRESS:-}
      AGENT_MANAGER_ADDRESS: ${AGENT_MANAGER_ADDRESS:-}
      USDC_E_ADDRESS: ${USDC_E_ADDRESS:-}
      WETH_ADDRESS: ${WETH_ADDRESS:-}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-}
      ZG_RPC_URL: ${ZG_RPC_URL:-}
      UNISWAP_API_KEY: ${UNISWAP_API_KEY:-}
      ENVIO_API_TOKEN: ${ENVIO_API_TOKEN:-testing}
      ENVIO_THROTTLE_CHAIN_METADATA_INTERVAL_MILLIS: ${ENVIO_THROTTLE_CHAIN_METADATA_INTERVAL_MILLIS:-5000}
      ENVIO_THROTTLE_PRUNE_STALE_DATA_INTERVAL_MILLIS: ${ENVIO_THROTTLE_PRUNE_STALE_DATA_INTERVAL_MILLIS:-5000}
      ENVIO_THROTTLE_LIVE_METRICS_BENCHMARK_INTERVAL_MILLIS: ${ENVIO_THROTTLE_LIVE_METRICS_BENCHMARK_INTERVAL_MILLIS:-5000}
      ENVIO_THROTTLE_JSON_FILE_BENCHMARK_INTERVAL_MILLIS: ${ENVIO_THROTTLE_JSON_FILE_BENCHMARK_INTERVAL_MILLIS:-5000}
      RPC_URL_SEI_MAINNET: ${RPC_URL_SEI_MAINNET:-https://rpc-mainnet.seinetwork.io}
      RPC_URL_SEI_TESTNET: ${RPC_URL_SEI_TESTNET:-https://rpc-testnet.seinetwork.io}
    healthcheck:
      test: timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1
      interval: 5s
      timeout: 2s
      retries: 50
      start_period: 5s
    networks:
      - envio-indexer-algebra-network
volumes:
  envio-indexer-algebra-storage:
  caddy-data:
  caddy-config:
networks:
  envio-indexer-algebra-network:
