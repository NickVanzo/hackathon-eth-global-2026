[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "cancun"      # REQUIRED for 0G Chain
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
og_testnet  = "https://evmrpc-testnet.0g.ai"
og_mainnet  = "https://evmrpc.0g.ai"
sepolia     = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
og_testnet = { key = "placeholder", url = "https://chainscan-galileo.0g.ai/api" }
