apiVersion: apps/v1
kind: Deployment
metadata:
  name: hasura
  namespace: arena-subgraph
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: hasura

  template:
    metadata:
      labels:
        app: hasura
    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: hasura
          image: hasura/graphql-engine:v2.43.0
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hasura-secret
                  key: PG_PASSWORD
            # Connect to Postgres in the arena-relayer namespace
            - name: HASURA_GRAPHQL_DATABASE_URL
              value: "postgres://arena:$(PG_PASSWORD)@postgres-service.arena-relayer.svc.cluster.local:5432/arena_indexer"
            - name: HASURA_GRAPHQL_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: hasura-secret
                  key: HASURA_GRAPHQL_ADMIN_SECRET

          envFrom:
            - configMapRef:
                name: hasura-config

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
