<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Primary gradient: cyan → 0G purple flow -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#7B3FE4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4A1D96" stop-opacity="1"/>
    </linearGradient>
    <!-- Tail accent gradient: purple fade -->
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B3FE4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0.12"/>
    </linearGradient>
    <!-- Ring gradient: cyan to purple -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Subtle glow filter with purple tint -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle with cyan-to-purple stroke -->
  <circle cx="256" cy="256" r="248" fill="#0e0e0e" stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- Koi body — single elegant arc, abstract and geometric -->
  <!-- Main body: a stylized teardrop/fish form swimming upward-right -->
  <g transform="translate(256,256) rotate(-30)" filter="url(#glow)">
    <!-- Body -->
    <path d="
      M 0,-120
      C 55,-120  95,-80  95,-20
      C 95,30    70,75   35,105
      L 0,85
      L -35,105
      C -70,75  -95,30  -95,-20
      C -95,-80 -55,-120 0,-120
      Z
    " fill="url(#bodyGrad)"/>

    <!-- Tail fin — two flowing curves splitting like liquidity -->
    <path d="
      M 0,85
      C 15,110  45,145  70,160
      C 50,145  20,120  0,105
      Z
    " fill="url(#tailGrad)"/>
    <path d="
      M 0,85
      C -15,110 -45,145 -70,160
      C -50,145 -20,120  0,105
      Z
    " fill="url(#tailGrad)"/>

    <!-- Eye — clean circle, the "intelligence" marker with glow -->
    <circle cx="0" cy="-62" r="18" fill="url(#eyeGlow)"/>
    <circle cx="0" cy="-62" r="14" fill="#0e0e0e"/>
    <circle cx="0" cy="-62" r="7" fill="#00E5FF"/>

    <!-- Dorsal accent line — minimal, implies motion -->
    <path d="
      M -60,-55
      C -30,-75  30,-75  60,-55
    " fill="none" stroke="#0e0e0e" stroke-width="2.5" stroke-opacity="0.4" stroke-linecap="round"/>

    <!-- Scale pattern — three subtle arcs implying DeFi precision -->
    <path d="M -30,-20 C -15,-35 15,-35 30,-20" fill="none" stroke="#0e0e0e" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round"/>
    <path d="M -25,5 C -12,-8 12,-8 25,5" fill="none" stroke="#0e0e0e" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round"/>
    <path d="M -20,28 C -10,17 10,17 20,28" fill="none" stroke="#0e0e0e" stroke-width="1.5" stroke-opacity="0.1" stroke-linecap="round"/>
  </g>

  <!-- Water ripple rings — liquidity pools, cyan-to-purple -->
  <ellipse cx="256" cy="388" rx="80" ry="8" fill="none" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.15"/>
  <ellipse cx="256" cy="398" rx="110" ry="10" fill="none" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.12"/>
  <ellipse cx="256" cy="407" rx="140" ry="11" fill="none" stroke="#7B3FE4" stroke-width="0.6" stroke-opacity="0.07"/>
</svg>
